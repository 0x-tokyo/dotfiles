########################
### GENERAL SETTINGS ###
########################
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',*:Tc'                          # truecolor
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'       # смена формы курсора
set -g base-index 1                                          # окна с 1
set -g pane-base-index 1                                     # панели с 1
set -g renumber-windows on                                   # перенумеровать окна при закрытии
set -g aggressive-resize on
set -g history-limit 10000
set -g set-titles on
set -g mouse on
set -g default-shell /usr/bin/zsh
set -g mode-keys vi                                          # vi в copy-mode
set -g status-keys vi
set -sg escape-time 10                                       # быстрый esc (важно для nvim)
set-environment -g LC_CTYPE "ru_RU.UTF-8"                    # кириллица

##################
### STATUS BAR ###
##################
set -g status-position top
set -g status-interval 5
set -g status-justify left

# Фон/текст статусбара
set -g status-style "bg=#1f2335 fg=#c0caf5"

# Слева: имя сессии (тёмный текст на акцентной плашке)
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "
set -g status-left-length 30

# Справа: дата и время
set -g status-right "#[fg=#7dcfff]%d.%m #[fg=#c0caf5,bold]%H:%M "
set -g status-right-length 30

# Неактивные окна
set -g window-status-format " #I:#W "
set -g window-status-style "fg=#565f89"

# Активное окно (тёмный текст на акцентной плашке)
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#7aa2f7,fg=#1a1b26,bold"

# Разделитель
set -g window-status-separator " | "

# Рамки панелей
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

#####################
### PREFIX Ctrl+a ###
#####################
unbind C-b
set -g prefix C-a
bind C-a send-prefix

#############
### PANES ###
#############
# Создание сплитов (открывают в текущей папке)
bind | split-window -h -c "#{pane_current_path}"   # вертикальный (рядом, делит по вертикали)
bind - split-window -v -c "#{pane_current_path}"   # горизонтальный (снизу)
unbind '"'
unbind %

# Навигация между панелями (vi-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Ресайз панелей (vi-style, заглавные)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

#################
### COPY MODE ###
#################
bind v copy-mode                                          # prefix+v → режим просмотра/копирования
bind -T copy-mode-vi v send -X begin-selection            # v → начать выделение
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"  # y → копировать в СИСТЕМНЫЙ буфер

###############
### PLUGINS ###
###############
set -g @plugin 'tmux-plugins/tpm'             # менеджер плагинов
set -g @plugin 'tmux-plugins/tmux-resurrect'  # сохранение/восстановление сессий
set -g @plugin 'tmux-plugins/tmux-continuum'  # автосохранение resurrect

# resurrect: восстанавливать nvim-сессии, сохранять содержимое панелей
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# continuum: автосейв каждые 15 мин, БЕЗ автостарта в фоне (boot off)
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# --- TPM init (ДОЛЖНО быть в самом конце конфига) ---
run '~/.config/tmux/plugins/tpm/tpm'
