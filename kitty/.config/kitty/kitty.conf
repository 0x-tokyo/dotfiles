# Шрифт
font_family      JetBrains Mono Nerd Font
font_size        14.0

# Сглаживание
text_composition_strategy legacy

# Отступы
window_padding_width 8

# Вкладки
tab_bar_style powerline

# Тема Everforest Dark Hard
# background            #272e33
# foreground            #d3c6aa
# cursor                #d3c6aa

# Цвета
# color0                #314145
# color1                #e67e80
# color2                #a7c080
# color3                #dbbc7f
# color4                #7fbbb3
# color5                #d699b6
# color6                #83c092
# color7                #d3c6aa
# color8                #475258
# color8                #e67e80
# color10               #a7c080
# color11               #dbbc7f
# color12               #7fbbb3
# color13               #d699b6
# color14               #83c092
# color15               #d3c6aa

# Курсор
cursor_shape beam
cursor_blink_interval 0
cursor_trail 3

# Прозрачность 
background_opacity 1.0

# Размер окна запоминать
remember_window_size yes

# Плавный скролл
wheel_scroll_multiplier 5.0

# Открывать новые окна/вкладки в той же директории
open_url_with default

# Горячие клавиши вкладок
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Горячие клавиши сплитов (окна внутри Kitty)
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Размер шрифта на лету
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Копировать/вставить
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Ссылки — открывать по клику
open_url_with default
detect_urls yes


# Layout'ы для сплитов
enabled_layouts splits,stack

# Горизонтальный сплит (снизу)
map ctrl+shift+d launch --location=hsplit --cwd=current
# Вертикальный сплит (справа)
map ctrl+shift+e launch --location=vsplit --cwd=current
# Сменить направление текущего сплита
map ctrl+shift+r layout_action rotate

# Закрыть только текущий сплит
map ctrl+shift+x close_window


# BEGIN_KITTY_THEME
# Spacedust
include current-theme.conf
# END_KITTY_THEME
# background #222D31


map ctrl+h no_op
map ctrl+l no_op
map ctrl+j no_op
map ctrl+k no_op


# resize (vim style)
map ctrl+shift+f7 resize_window narrower
map ctrl+shift+f8 resize_window wider
map ctrl+shift+f9 resize_window taller
map ctrl+shift+f10 resize_window shorter
map ctrl+shift+f11 resize_window reset

# Вкладки сверху
tab_bar_edge top
tab_powerline_style angled

# Remote control (нужно для применения цветов вкладок из хука)
allow_remote_control yes
listen_on unix:@mykitty

# Отключённый reload (крашится на этом драйвере)
# map ctrl+shift+f5 no_op
